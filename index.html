<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DMX Adresa - Koloros</title>
  
  <!-- PWA Meta Tags pro mobilní aplikaci -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMX Tool">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    input, select, button { font-size: 16px !important; }
    body { 
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-tap-highlight-color: transparent;
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* DIP Switch Visuals */
    .switch-block {
      background: #111;
      border: 4px solid #333;
      border-radius: 12px;
      padding: 16px 12px;
      display: flex;
      justify-content: space-between;
      box-shadow: inset 0 10px 25px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5);
    }
    .dip-switch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer; /* Změna kurzoru při najetí */
    }
    .dip-slot {
      width: 26px;
      height: 54px;
      background: #0a0a0a;
      border-radius: 4px;
      position: relative;
      border: 1px solid #000;
      box-shadow: inset 0 2px 5px rgba(0,0,0,1);
    }
    .dip-knob {
      width: 20px;
      height: 24px;
      background: #f0f0f0;
      border-radius: 3px;
      position: absolute;
      left: 2px;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.8);
    }
    .dip-knob.on { top: 4px; background: #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.4); }
    .dip-knob.off { bottom: 4px; background: #d4d4d8; }
    .dip-num { font-size: 10px; color: #888; font-weight: 900; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      // Výchozí adresa 1 (první switch nahoře)
      const [address, setAddress] = useState('1');
      const [dipStates, setDipStates] = useState([true, false, false, false, false, false, false, false, false, false]);

      // Funkce pro aktualizaci přepínačů při ručním zápisu adresy
      const handleAddressChange = (e) => {
        let val = e.target.value;
        setAddress(val);
        
        let num = parseInt(val);
        if (isNaN(num)) num = 0;
        if (num > 512) num = 512;

        const newStates = [...dipStates];
        for (let i = 0; i < 9; i++) {
          newStates[i] = !!(num & (1 << i));
        }
        setDipStates(newStates);
      };

      // Tlačítka + a -
      const adjustAddress = (amount) => {
        let num = parseInt(address);
        if (isNaN(num)) num = 0;
        let newNum = num + amount;
        if (newNum < 0) newNum = 0;
        if (newNum > 512) newNum = 512;
        
        setAddress(newNum.toString());
        
        const newStates = [...dipStates];
        for (let i = 0; i < 9; i++) {
          newStates[i] = !!(newNum & (1 << i));
        }
        setDipStates(newStates);
      };

      // Funkce pro aktualizaci adresy při KLIKNUTÍ na přepínač
      const toggleSwitch = (index) => {
        const newStates = [...dipStates];
        newStates[index] = !newStates[index];
        setDipStates(newStates);

        // Pokud jsme neklikli na 10. switch (který je jen pro módy), přepočítáme adresu
        if (index < 9) {
          let newAddr = 0;
          for (let i = 0; i < 9; i++) {
            if (newStates[i]) newAddr += (1 << i);
          }
          setAddress(newAddr.toString());
        }
      };

      return (
        <div className="min-h-screen p-4 flex justify-center pb-12">
          <div className="w-full max-w-lg">
            <header className="mb-8 text-center pt-6">
              <div className="inline-block px-5 py-2 bg-white text-black text-4xl font-black tracking-tighter rounded-sm shadow-xl">KOLOROS.CZ</div>
              <div className="text-[11px] font-black uppercase tracking-[0.4em] text-gray-400 mt-4 opacity-80">DMX Address Tool</div>
            </header>

            <div className="animate-fade-in space-y-6">
              
              {/* Sekce pro zadání čísla */}
              <div className="bg-neutral-900 p-8 rounded-[2.5rem] shadow-2xl border border-neutral-800 text-center">
                <label className="text-[11px] font-black uppercase text-gray-500 tracking-[0.2em] mb-4 block">Cílová DMX Adresa</label>
                <div className="flex items-center justify-between gap-4">
                  <button 
                    onClick={() => adjustAddress(-1)}
                    className="w-16 h-16 bg-neutral-800 hover:bg-neutral-700 rounded-2xl font-black text-3xl text-white active:scale-90 transition-all shadow-sm"
                  >
                    -
                  </button>
                  <input 
                    type="number" 
                    inputMode="numeric"
                    value={address}
                    onChange={handleAddressChange}
                    className="flex-1 bg-transparent text-white text-7xl font-black outline-none border-none text-center"
                    placeholder="0"
                  />
                  <button 
                    onClick={() => adjustAddress(1)}
                    className="w-16 h-16 bg-neutral-800 hover:bg-neutral-700 rounded-2xl font-black text-3xl text-white active:scale-90 transition-all shadow-sm"
                  >
                    +
                  </button>
                </div>
              </div>

              {/* Sekce pro fyzické přepínače */}
              <div className="bg-neutral-900 p-6 rounded-[3rem] shadow-2xl border border-neutral-800">
                <div className="flex justify-between items-center mb-6 px-2">
                  <span className="font-black text-xs uppercase tracking-widest text-gray-400">DIP Switch Panel</span>
                  <span className="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-full font-black tracking-widest uppercase shadow-lg shadow-blue-500/20 animate-pulse">Interactive</span>
                </div>

                <div className="switch-block">
                  {dipStates.map((on, i) => (
                    <div key={i} className="dip-switch" onClick={() => toggleSwitch(i)}>
                      <span className="dip-num">{i + 1}</span>
                      <div className="dip-slot">
                        <div className={`dip-knob ${on ? 'on' : 'off'}`}></div>
                      </div>
                      <span className={`text-[9px] font-black mt-1 transition-colors ${on ? 'text-blue-500' : 'text-gray-600'}`}>
                        {on ? 'ON' : 'OFF'}
                      </span>
                      <span className="text-[8px] font-bold text-gray-600 mt-1">
                        {i < 9 ? Math.pow(2, i) : 'MOD'}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            
            <footer className="mt-16 text-center text-gray-600 text-[10px] font-black uppercase tracking-[0.4em] opacity-50">
              © 2026 KOLOROS PRODUCTION
            </footer>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
